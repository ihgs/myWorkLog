name: CI

# R-NF-3: macOS および Windows で動作することをビルドで担保する。
# T-08(cargo test) / T-13,T-14,T-15(FEビルド) / featureシナリオの土台をCIで検証する。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # --- バックエンド検証: 集計など Rust 側の単体テスト (R-NF-4 / T-08) ---
      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all

      # --- フロント検証: tsc 型チェック + Vite ビルド (R-UI / T-13,T-14,T-15) ---
      - name: Frontend build
        run: pnpm build

      # --- パッケージング: macOS/Windows で Tauri アプリをバンドルする (R-NF-3) ---
      - name: Tauri build (package)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: mylog-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: ignore
